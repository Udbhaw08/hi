<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIGIL - Visual Intelligence Narrator</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0f;
            --accent-color: #00f5ff;
            --text-color: #ffffff;
            --secondary-text: #a0a0a0;
            --border-color: #1f1f2e;
            --terminal-bg: #12121a;
            
            --threat-normal: #00ff00;
            --threat-elevated: #ffff00;
            --threat-critical: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            color: var(--accent-color);
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
        }

        .subtitle {
            color: var(--secondary-text);
            font-size: 1rem;
            letter-spacing: 2px;
        }

        main {
            width: 100%;
            max-width: 800px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .drop-zone {
            border: 2px dashed var(--accent-color);
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 245, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover, .drop-zone.dragover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .drop-zone.hidden {
            display: none;
        }

        .upload-icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 1rem;
        }

        #file-input {
            display: none;
        }

        .preview-container {
            display: none;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .preview-container.active {
            display: block;
        }

        #image-preview {
            max-height: 300px;
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(2px);
            border-radius: 4px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .scan-bar {
            width: 80%;
            height: 4px;
            background: rgba(0, 245, 255, 0.2);
            position: relative;
            overflow: hidden;
            margin-bottom: 1rem;
            border-radius: 2px;
        }

        .scan-line {
            width: 30%;
            height: 100%;
            background: var(--accent-color);
            position: absolute;
            left: -30%;
            animation: scan 1.5s infinite ease-in-out;
            box-shadow: 0 0 10px var(--accent-color);
        }

        @keyframes scan {
            100% { left: 100%; }
        }

        .loading-text {
            color: var(--accent-color);
            font-size: 1.2rem;
            letter-spacing: 2px;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .results {
            display: none;
            background: var(--terminal-bg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-direction: column;
            gap: 1.5rem;
        }

        .results.active {
            display: flex;
        }

        .badges {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .badge {
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            border: 1px solid currentColor;
        }

        .badge.threat { color: var(--text-color); }
        .badge.threat.normal { border-color: var(--threat-normal); color: var(--threat-normal); }
        .badge.threat.elevated { border-color: var(--threat-elevated); color: var(--threat-elevated); }
        .badge.threat.critical { border-color: var(--threat-critical); color: var(--threat-critical); background: rgba(255,0,0,0.1); }
        
        .badge.scene { border-color: var(--accent-color); color: var(--accent-color); }
        .badge.subject { border-color: #ff00ff; color: #ff00ff; }

        .narration-box {
            background: rgba(0,0,0,0.3);
            border-left: 3px solid var(--accent-color);
            padding: 1rem;
            line-height: 1.6;
            font-size: 1.1rem;
            overflow-y: auto;
            max-height: 200px;
        }

        .narration-cursor::after {
            content: '█';
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .lang-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0, 245, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 8px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-weight: bold;
        }

        .lang-toggle select {
            background: var(--terminal-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.5rem;
            font-family: inherit;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        .audio-player {
            width: 100%;
            filter: invert(1) hue-rotate(180deg) contrast(1.5);
            outline: none;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        
        .audio-player:hover {
            opacity: 1;
        }

        .reset-btn {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 0.5rem 1rem;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            margin-top: 1rem;
            align-self: flex-end;
        }

        .reset-btn:hover {
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.3);
        }

        footer {
            margin-top: auto;
            color: var(--secondary-text);
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .error-msg {
            color: var(--threat-critical);
            margin-top: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>VIGIL</h1>
        <div class="subtitle">Visual Intelligence Narrator</div>
    </header>

    <main>
        <div class="lang-toggle">
            <label for="lang-select">AUDIO LANGUAGE: </label>
            <select id="lang-select">
                <option value="en">ENGLISH</option>
                <option value="hi">HINDI</option>
            </select>
        </div>

        <div class="drop-zone" id="drop-zone">
            <div class="upload-icon">⇪</div>
            <p>Drag & Drop an image here</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--secondary-text);">or click to browse</p>
            <input type="file" id="file-input" accept="image/jpeg, image/png">
            <div class="error-msg" id="error-msg"></div>
        </div>

        <div class="preview-container" id="preview-container">
            <img id="image-preview" src="" alt="Preview">
            <div class="loading-overlay" id="loading-overlay">
                <div class="scan-bar"><div class="scan-line"></div></div>
                <div class="loading-text">ANALYZING...</div>
            </div>
        </div>

        <div class="results" id="results">
            <div class="badges">
                <span class="badge threat" id="threat-badge">THREAT: NORMAL</span>
                <span class="badge scene" id="scene-badge">SCENE: UNKNOWN</span>
                <span class="badge subject" id="subject-badge">SUBJECTS: 0</span>
            </div>
            
            <div class="narration-box" id="narration-text"></div>
            
            <audio controls class="audio-player" id="audio-player"></audio>
            
            <button class="reset-btn" id="reset-btn">NEW ANALYSIS</button>
        </div>
    </main>

    <footer>
        <p>Powered by Gemini + ElevenLabs</p>
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const loadingOverlay = document.getElementById('loading-overlay');
        const resultsBox = document.getElementById('results');
        const errorMsg = document.getElementById('error-msg');
        
        const threatBadge = document.getElementById('threat-badge');
        const sceneBadge = document.getElementById('scene-badge');
        const subjectBadge = document.getElementById('subject-badge');
        const narrationText = document.getElementById('narration-text');
        const audioPlayer = document.getElementById('audio-player');
        const resetBtn = document.getElementById('reset-btn');

        // Drag & Drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', handleDrop, false);
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFiles(e.target.files);
        });

        function handleDrop(e) {
            const dt = e.dataTransfer;
            const files = dt.files;
            handleFiles(files);
        }

        function handleFiles(files) {
            const file = files[0];
            if (!file) return;
            
            if (!['image/jpeg', 'image/png'].includes(file.type)) {
                showError("Only JPEG/PNG supported");
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                showError("File too large (max 5MB)");
                return;
            }
            
            errorMsg.style.display = 'none';
            
            // Show preview
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = function() {
                imagePreview.src = reader.result;
                dropZone.classList.add('hidden');
                previewContainer.classList.add('active');
                
                // Commence analysis
                uploadForAnalysis(file);
            }
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        async function uploadForAnalysis(file) {
            loadingOverlay.classList.add('active');
            
            const formData = new FormData();
            formData.append('image', file);
            formData.append('language', document.getElementById('lang-select').value);
            
            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || "Analysis failed");
                }
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                loadingOverlay.classList.remove('active');
                dropZone.classList.remove('hidden');
                previewContainer.classList.remove('active');
                showError(error.message);
            }
        }

        function displayResults(data) {
            loadingOverlay.classList.remove('active');
            resultsBox.classList.add('active');
            
            const meta = data.metadata || {};
            
            // Set badges
            const threatLevel = meta.threat_level || 'normal';
            threatBadge.className = `badge threat ${threatLevel}`;
            threatBadge.textContent = `THREAT: ${threatLevel.toUpperCase()}`;
            
            sceneBadge.textContent = `SCENE: ${(meta.scene_type || 'unknown').toUpperCase()}`;
            subjectBadge.textContent = `SUBJECTS: ${meta.subject_count || 0}`;
            
            // Typewriter effect for narration
            narrationText.textContent = '';
            narrationText.classList.add('narration-cursor');
            
            let i = 0;
            const text = data.narration;
            const speed = 30; // ms per char
            
            function typeWriter() {
                if (i < text.length) {
                    narrationText.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, speed);
                } else {
                    narrationText.classList.remove('narration-cursor');
                }
            }
            typeWriter();
            
            // Set up audio
            if (data.audio_base64) {
                audioPlayer.src = `data:audio/mpeg;base64,${data.audio_base64}`;
                // Auto play
                audioPlayer.play().catch(e => console.log("Auto-play prevented by browser"));
            } else {
                audioPlayer.src = "";
            }
        }

        resetBtn.addEventListener('click', () => {
            fileInput.value = "";
            resultsBox.classList.remove('active');
            previewContainer.classList.remove('active');
            dropZone.classList.remove('hidden');
            audioPlayer.pause();
            audioPlayer.src = "";
            imagePreview.src = "";
        });
    </script>
</body>
</html>
